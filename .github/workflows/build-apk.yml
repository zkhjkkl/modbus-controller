name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      
      - name: Debug - List directory structure
        run: |
          echo "Current directory:"
          pwd
          echo "Contents:"
          ls -la
      
      - name: Check Flutter environment
        run: |
          flutter doctor -v
          flutter --version
      
      - name: Initialize Flutter project
        run: |
          if [ ! -d "tablet_app" ]; then
            echo "ERROR: tablet_app directory not found!"
            ls -la
            exit 1
          fi
          cd tablet_app

          # 确保Flutter项目完整
          echo "Ensuring Flutter project is complete..."

          # 创建缺失的必需文件
          if [ ! -f "analysis_options.yaml" ]; then
            echo "Creating analysis_options.yaml..."
            echo "include: package:flutter_lints/flutter.yaml" > analysis_options.yaml
          fi

          if [ ! -f ".gitignore" ]; then
            echo "Creating .gitignore..."
            echo -e "# Flutter/Dart/Pub related\n**/doc/api/\n.dart_tool/\n.flutter-plugins\n.flutter-plugins-dependencies\n.packages\n.pub-cache/\n.pub/\nbuild/\n\n# Android related\n**/android/**/gradle-wrapper.jar\n**/android/.gradle\n**/android/captures/\n**/android/gradlew\n**/android/gradlew.bat\n**/android/local.properties\n**/android/**/GeneratedPluginRegistrant.java" > .gitignore
          fi

          if [ ! -d "test" ]; then
            echo "Creating test directory..."
            mkdir -p test
          fi

          # 生成Android平台文件（如果缺失）
          if [ ! -d "android" ]; then
            echo "Generating Android platform files..."
            flutter create --platforms=android --no-overwrite .
          else
            echo "Android platform files already exist"
          fi
      
      - name: Install dependencies
        run: |
          cd tablet_app
          flutter pub get
      
      - name: Build APK
        run: |
          cd tablet_app
          flutter build apk --release --no-tree-shake-icons --verbose
      
      - uses: actions/upload-artifact@v4
        with:
          name: modbus-controller-apk
          path: tablet_app/build/app/outputs/apk/release/app-release.apk