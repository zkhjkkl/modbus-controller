name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      
      - uses: subosito/flutter-action@v4
        with:
          flutter-version: '3.22.0'
      
      - name: Debug - List directory structure
        run: |
          echo "Current directory:"
          pwd
          echo "Contents:"
          ls -la
      
      - name: Check Flutter environment
        run: |
          flutter doctor -v
          flutter --version
      
      - name: Initialize Flutter project
        run: |
          if [ ! -d "tablet_app" ]; then
            echo "ERROR: tablet_app directory not found!"
            ls -la
            exit 1
          fi
          cd tablet_app
          if [ ! -d "android" ]; then
            echo "Generating Android platform files..."
            flutter create --platforms=android .
          else
            echo "Android platform files already exist"
          fi
      
      - name: Install dependencies
        run: |
          cd tablet_app
          flutter pub get
      
      - name: Build APK
        run: |
          cd tablet_app
          flutter build apk --release --no-tree-shake-icons --verbose
      
      - uses: actions/upload-artifact@v5
        with:
          name: modbus-controller-apk
          path: tablet_app/build/app/outputs/apk/release/app-release.apk